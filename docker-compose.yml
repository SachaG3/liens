services:
  liens:
    build:
      context: .
      target: runner
    image: "${LIENS_IMAGE:-liens:latest}"
    ports:
      - "${APP_HOST:-0.0.0.0}:${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "file:./data/family.db"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-false}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-auto}"
      REGISTRATION_OPEN: "${REGISTRATION_OPEN:-true}"
      NOMINIS_ENABLED: "${NOMINIS_ENABLED:-false}"
      IMMICH_URL: "${IMMICH_URL:-}"
      IMMICH_API_KEY: "${IMMICH_API_KEY:-}"
      APP_URL: "${APP_URL:-http://localhost:3000}"
      NOTIFICATION_CRON_SECRET: "${NOTIFICATION_CRON_SECRET:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SIGNAL_API_URL: "${SIGNAL_API_URL:-}"
      SIGNAL_SENDER: "${SIGNAL_SENDER:-}"
      NTFY_BASE_URL: "${NTFY_BASE_URL:-https://ntfy.sh}"
    volumes:
      - liens_data:/app/prisma/data
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    pids_limit: 256
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  notifications:
    profiles: ["notifications"]
    image: "${LIENS_IMAGE:-liens:latest}"
    depends_on:
      liens:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          wget -qO- --post-data="" --header="Authorization: Bearer $${NOTIFICATION_CRON_SECRET}" http://liens:3000/api/notifications/dispatch || true
          sleep "$${NOTIFICATION_INTERVAL_SECONDS:-3600}"
        done
    environment:
      NOTIFICATION_CRON_SECRET: "${NOTIFICATION_CRON_SECRET:-}"
      NOTIFICATION_INTERVAL_SECONDS: "${NOTIFICATION_INTERVAL_SECONDS:-3600}"
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  liens_data:
