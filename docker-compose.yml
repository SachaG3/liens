services:
  liens:
    build: .
    image: liens:latest
    container_name: liens
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "file:./data/family.db"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-false}"
    volumes:
      - liens_data:/app/prisma/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  liens_data:
