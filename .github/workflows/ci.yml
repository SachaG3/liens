name: Vérifications

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  qualite:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/ci.db
      REGISTRATION_OPEN: "true"
      SESSION_COOKIE_SECURE: "false"
      NOMINIS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
